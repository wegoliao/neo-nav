好的，我完全理解 Neo 的背景與需求。現在直接產出完整 4 版設計稿 HTML，可直接存檔在瀏覽器預覽比稿。

由於 HTML 內容極大（4版 × 7頁面 × 2主題），我採用**單一 HTML + Tab 切換**架構，讓你直接點選比較。

````html
<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Neo-nav · 4版設計稿比稿</title>
<style>
/* ═══════════════════════════════════════════
   SHELL & NAVIGATION
═══════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang TC',sans-serif;background:#111827;color:#1e293b;font-size:14px;min-height:100vh;}

/* Top Nav */
.shell-nav{position:sticky;top:0;z-index:999;background:#0f172a;border-bottom:1px solid #1e3a5f;padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.shell-nav h1{color:#fff;font-size:.9rem;font-weight:900;letter-spacing:.3px;white-space:nowrap;}
.shell-nav span{color:#475569;font-size:.62rem;}
.ver-tabs{display:flex;gap:5px;flex-wrap:wrap;}
.ver-tab{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.5);border-radius:20px;padding:5px 13px;font-size:.68rem;font-weight:700;cursor:pointer;transition:all .2s;white-space:nowrap;}
.ver-tab.on{color:#fff;border-color:transparent;}
.ver-tab[data-v="A"].on{background:#0ea5e9;}
.ver-tab[data-v="B"].on{background:#8b5cf6;}
.ver-tab[data-v="C"].on{background:#059669;}
.ver-tab[data-v="D"].on{background:#f59e0b;}

/* Page Tabs */
.page-tabs{background:#1e293b;border-bottom:1px solid #334155;padding:8px 12px;display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;}
.page-tabs::-webkit-scrollbar{display:none;}
.page-tab{background:transparent;border:1px solid #334155;color:#64748b;border-radius:8px;padding:5px 11px;font-size:.65rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s;}
.page-tab.on{background:#334155;color:#e2e8f0;border-color:#475569;}

/* Theme Toggle */
.theme-toggle{margin-left:auto;display:flex;gap:4px;}
.th-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.5);border-radius:8px;padding:4px 10px;font-size:.65rem;font-weight:700;cursor:pointer;}
.th-btn.on{background:#334155;color:#e2e8f0;}

/* Canvas */
.canvas{padding:20px 16px 48px;display:flex;justify-content:center;align-items:flex-start;flex-wrap:wrap;gap:20px;}
.version-block{display:none;}
.version-block.on{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;}
.page-block{display:none;}
.page-block.on{display:block;}

/* Phone Frame */
.phone-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;}
.phone-label{color:#64748b;font-size:.6rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;}
.phone{width:375px;min-width:375px;border-radius:38px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.06);}

/* ═══════════════════════════════════════════
   VERSION A — 極簡溫柔版
═══════════════════════════════════════════ */

/* A Tokens */
.va{--p:#0ea5e9;--pl:#e0f2fe;--pm:#7dd3fc;--s:#10b981;--sl:#d1fae5;--a:#f59e0b;--al:#fef3c7;--pu:#8b5cf6;--pul:#f5f3ff;--bg:#f8fafc;--card:#fff;--bd:#e2e8f0;--t1:#1e293b;--t2:#64748b;--t3:#94a3b8;--r:14px;}
.va.dk{--bg:#0b1120;--card:#1e293b;--bd:#334155;--t1:#e2e8f0;--t2:#94a3b8;--t3:#475569;}

/* A: Shared */
.va .scr{background:var(--bg);min-height:700px;padding-bottom:28px;}
.va .top-bar{background:var(--card);border-bottom:1px solid var(--bd);padding:13px 18px;display:flex;align-items:center;gap:9px;}
.va .back{width:30px;height:30px;background:var(--bg);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.8rem;cursor:pointer;flex-shrink:0;}
.va .bar-title{font-size:.88rem;font-weight:800;color:var(--t1);}
.va .bar-sub{font-size:.6rem;color:var(--t3);margin-top:1px;}
.va .badge-sm{margin-left:auto;font-size:.6rem;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap;}
.va .sec-lbl{font-size:.6rem;font-weight:700;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;padding:12px 18px 5px;}
.va .card{background:var(--card);border-radius:var(--r);border:1px solid var(--bd);margin:0 16px 10px;overflow:hidden;}
.va .card-head{padding:10px 14px;border-bottom:1px solid var(--bd);font-size:.76rem;font-weight:800;color:var(--t1);display:flex;align-items:center;gap:6px;}
.va .card-body{padding:10px 14px;}
.va .field-row{margin-bottom:10px;}
.va .field-row:last-child{margin-bottom:0;}
.va .fl{font-size:.6rem;font-weight:700;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;}
.va .chip-row{display:flex;gap:6px;flex-wrap:wrap;}
.va .chip{background:var(--card);border:1.5px solid var(--bd);border-radius:20px;padding:7px 13px;font-size:.75rem;font-weight:700;color:var(--t2);cursor:pointer;}
.va .chip.on{background:var(--pl);border-color:var(--p);color:var(--p);}
.va.dk .chip.on{background:#0c2d4a;border-color:#0284c7;color:#38bdf8;}
.va .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
.va .g2{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.va .state-btn{background:var(--card);border:2px solid var(--bd);border-radius:12px;padding:12px 5px;text-align:center;cursor:pointer;}
.va .state-btn .se{font-size:1.4rem;margin-bottom:3px;}
.va .state-btn .sl{font-size:.7rem;font-weight:700;color:var(--t2);}
.va .state-btn.g{background:var(--sl);border-color:var(--s);} .va .state-btn.g .sl{color:#059669;}
.va .state-btn.y{background:var(--al);border-color:var(--a);} .va .state-btn.y .sl{color:#d97706;}
.va .state-btn.r{background:#fee2e2;border-color:#ef4444;} .va .state-btn.r .sl{color:#dc2626;}
.va.dk .state-btn.g{background:#052e16;border-color:#10b981;} .va.dk .state-btn.g .sl{color:#86efac;}
.va.dk .state-btn.y{background:#2d1b00;border-color:#f59e0b;} .va.dk .state-btn.y .sl{color:#fcd34d;}
.va.dk .state-btn.r{background:#2d0a0a;border-color:#ef4444;} .va.dk .state-btn.r .sl{color:#fca5a5;}
.va .tog{background:var(--card);border:2px solid var(--bd);border-radius:11px;padding:12px;text-align:center;font-size:.78rem;font-weight:700;color:var(--t3);cursor:pointer;}
.va .tog.y{background:var(--sl);border-color:var(--s);color:#059669;}
.va .tog.n{background:#fee2e2;border-color:#ef4444;color:#dc2626;}
.va.dk .tog.y{background:#052e16;border-color:#10b981;color:#86efac;}
.va.dk .tog.n{background:#2d0a0a;border-color:#ef4444;color:#fca5a5;}
.va .textarea-wrap{background:var(--card);border:1.5px solid var(--bd);border-radius:12px;padding:11px 13px;margin:0 16px;}
.va textarea{width:100%;border:none;outline:none;resize:none;font-size:.82rem;color:var(--t1);font-family:inherit;line-height:1.6;background:transparent;}
.va .btn-pri{margin:10px 16px 0;width:calc(100% - 32px);background:linear-gradient(135deg,var(--p),#0284c7);border:none;border-radius:13px;padding:15px;color:#fff;font-size:.9rem;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;}
.va .btn-sec{margin:7px 16px 0;width:calc(100% - 32px);background:var(--card);border:1.5px solid var(--bd);border-radius:13px;padding:12px;color:var(--t2);font-size:.8rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
.va .ci{background:var(--bg);border:1.5px solid var(--bd);border-radius:9px;padding:8px 4px;text-align:center;font-size:.68rem;font-weight:700;color:var(--t2);cursor:pointer;}
.va .ci.g{background:var(--sl);border-color:var(--s);color:#059669;}
.va .ci.y{background:var(--al);border-color:var(--a);color:#d97706;}
.va .ci.r{background:#fee2e2;border-color:#ef4444;color:#dc2626;}
.va.dk .ci.g{background:#052e16;border-color:#10b981;color:#86efac;}
.va.dk .ci.y{background:#2d1b00;border-color:#f59e0b;color:#fcd34d;}
.va.dk .ci.r{background:#2d0a0a;border-color:#ef4444;color:#fca5a5;}
/* A: Login */
.va .login-scr{background:var(--bg);min-height:700px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 26px;}
.va .login-logo{width:58px;height:58px;background:linear-gradient(135deg,#0ea5e9,#10b981);border-radius:17px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin-bottom:14px;box-shadow:0 4px 18px rgba(14,165,233,.22);}
.va .login-title{font-size:1.15rem;font-weight:800;color:var(--t1);text-align:center;}
.va .login-sub{font-size:.7rem;color:var(--t3);text-align:center;margin-top:4px;margin-bottom:26px;line-height:1.6;}
.va .login-card{background:var(--card);border-radius:17px;padding:22px;width:100%;border:1px solid var(--bd);}
.va .lbl{font-size:.62rem;font-weight:700;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px;}
.va .inp{width:100%;background:var(--bg);border:1.5px solid var(--bd);border-radius:10px;padding:13px 15px;font-size:.9rem;color:var(--t1);letter-spacing:3px;text-align:center;outline:none;margin-bottom:13px;font-family:inherit;}
.va .login-btn{width:100%;background:linear-gradient(135deg,#0ea5e9,#0284c7);border:none;border-radius:11px;padding:14px;color:#fff;font-size:.9rem;font-weight:800;cursor:pointer;}
.va .login-hint{font-size:.6rem;color:var(--t3);text-align:center;margin-top:9px;}
/* A: Role */
.va .role-hero{background:linear-gradient(135deg,#0f172a,#1e3a8a);padding:20px 18px 16px;color:#fff;}
.va .rh-title{font-size:1rem;font-weight:900;}
.va .rh-sub{font-size:.68rem;opacity:.55;margin-top:2px;}
.va .rh-date{background:rgba(255,255,255,.12);border-radius:8px;padding:6px 10px;margin-top:10px;font-size:.67rem;display:inline-flex;align-items:center;gap:5px;}
.va .role-list{display:flex;flex-direction:column;gap:7px;padding:12px 16px;}
.va .role-item{background:var(--card);border-radius:13px;padding:13px 15px;display:flex;align-items:center;gap:11px;border:1.5px solid var(--bd);cursor:pointer;}
.va .ri-emoji{font-size:1.3rem;width:34px;text-align:center;flex-shrink:0;}
.va .ri-name{font-size:.86rem;font-weight:800;color:var(--t1);}
.va .ri-desc{font-size:.62rem;color:var(--t3);margin-top:1px;}
.va .ri-arrow{margin-left:auto;color:var(--t3);font-size:.8rem;}
/* A: Summary Banner */
.va .summary-banner{margin:10px 16px;background:linear-gradient(135deg,#1e3a8a,#1d4ed8);border-radius:14px;padding:14px 15px;color:#fff;}
.va .sb-title{font-size:.6rem;font-weight:700;opacity:.6;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;}
.va .sb-row{display:flex;align-items:center;gap:8px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.1);}
.va .sb-row:last-child{border-bottom:none;}
.va .sb-icon{font-size:.95rem;width:20px;text-align:center;flex-shrink:0;}
.va .sb-text{font-size:.78rem;font-weight:500;flex:1;}
.va .sb-badge{font-size:.6rem;font-weight:700;padding:2px 8px;border-radius:8px;flex-shrink:0;}
.bg-g{background:rgba(134,239,172,.2);color:#86efac;}
.bg-y{background:rgba(252,211,77,.2);color:#fcd34d;}
.bg-r{background:rgba(252,165,165,.2);color:#fca5a5;}
/* A: Reminder */
.va .remind{margin:0 16px 9px;background:var(--al);border:1.5px solid #fde68a;border-radius:11px;padding:10px 12px;display:flex;gap:7px;}
.va.dk .remind{background:#1c1500;border-color:#78350f;}
.va .remind-text{font-size:.74rem;color:#92400e;line-height:1.5;font-weight:500;}
.va.dk .remind-text{color:#fcd34d;}
/* A: Tool Card */
.va .tool-card{margin:0 16px 9px;background:var(--pul);border:1.5px solid #c4b5fd;border-radius:11px;padding:10px 12px;}
.va.dk .tool-card{background:#1a0a2e;border-color:#4c1d95;}
.va .tc-title{font-size:.6rem;font-weight:700;color:var(--pu);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.va.dk .tc-title{color:#a78bfa;}
.va .tool-chips{display:flex;flex-wrap:wrap;gap:5px;}
.va .tool-chip{background:#fff;border:1px solid #c4b5fd;border-radius:7px;padding:4px 9px;font-size:.68rem;font-weight:600;color:var(--pu);display:flex;align-items:center;gap:3px;}
.va.dk .tool-chip{background:#2e1065;border-color:#4c1d95;color:#c4b5fd;}
/* A: Pickup Hero */
.va .pickup-hero{margin:10px 16px;background:linear-gradient(135deg,#f59e0b,#d97706);border-radius:18px;padding:17px;color:#fff;}
.va .pu-lbl{font-size:.6rem;font-weight:700;opacity:.7;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;}
.va .pu-title{font-size:.92rem;font-weight:900;margin-bottom:12px;}
.va .pu-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.va .pu-btn{background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.3);border-radius:11px;padding:12px 7px;text-align:center;color:#fff;font-size:.76rem;font-weight:800;cursor:pointer;}
.va .pu-btn.on{background:#fff;color:#d97706;border-color:#fff;}
.va .pu-main{grid-column:span 2;background:#fff;color:#d97706;border:none;border-radius:11px;padding:15px;font-size:.92rem;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;}
/* A: Overview */
.va .ov-hero{background:linear-gradient(135deg,#0f172a,#1e3a8a);padding:17px 18px 13px;color:#fff;}
.va .ov-title{font-size:.98rem;font-weight:900;}
.va .ov-sub{font-size:.66rem;opacity:.5;margin-top:2px;}
.va .ov-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-top:11px;}
.va .ov-stat{background:rgba(255,255,255,.1);border-radius:9px;padding:8px;text-align:center;}
.va .ov-n{font-size:1.25rem;font-weight:900;}
.va .ov-l{font-size:.56rem;opacity:.6;margin-top:1px;}
.va .today-card{margin:10px 16px;background:var(--card);border-radius:13px;overflow:hidden;border:1px solid var(--bd);}
.va .tc-row{padding:8px 13px;border-bottom:1px solid var(--bg);display:flex;align-items:center;gap:7px;}
.va .tc-row:last-child{border-bottom:none;}
.va .tc-who{font-size:.58rem;font-weight:700;padding:2px 7px;border-radius:5px;flex-shrink:0;}
.wp{background:#dbeafe;color:#1d4ed8;} .wt{background:#d1fae5;color:#065f46;} .wa{background:#fef3c7;color:#92400e;} .wn{background:#fce7f3;color:#9d174d;}
.va.dk .wp{background:#0c2d4a;color:#38bdf8;} .va.dk .wt{background:#052e16;color:#86efac;} .va.dk .wa{background:#2d1b00;color:#fcd34d;} .va.dk .wn{background:#2d0a1e;color:#f472b6;}
.va .tc-text{flex:1;font-size:.72rem;color:var(--t1);}
.va .tc-val{font-size:.72rem;font-weight:700;color:var(--t1);flex-shrink:0;}
/* A: Fake Chart */
.va .chart-card{margin:0 16px 9px;background:var(--card);border-radius:13px;padding:12px 13px;border:1px solid var(--bd);}
.va .chart-title{font-size:.74rem;font-weight:800;color:var(--t1);margin-bottom:10px;}
.va .bars{display:flex;align-items:flex-end;gap:5px;height:68px;}
.va .bw{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.va .bar{width:100%;border-radius:4px 4px 0 0;}
.va .bl{font-size:.53rem;color:var(--t3);font-weight:600;}
.va .legend{display:flex;gap:9px;margin-top:7px;flex-wrap:wrap;}
.va .leg{display:flex;align-items:center;gap:3px;font-size:.58rem;color:var(--t2);}
.va .ldot{width:6px;height:6px;border-radius:50%;}
/* A: Neo */
.va .neo-scr{background:linear-gradient(160deg,#fef9c3,#fef3c7,#fde68a);min-height:700px;padding-bottom:28px;}
.va.dk .neo-scr{background:linear-gradient(160deg,#1a0e00,#2d1b00,#1a0e00);}
.va .neo-hero{padding:18px 18px 12px;text-align:center;}
.va .neo-avatar{width:54px;height:54px;background:linear-gradient(135deg,#f59e0b,#ec4899);border-radius:17px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;margin:0 auto 9px;box-shadow:0 5px 18px rgba(245,158,11,.28);}
.va .neo-title{font-size:.95rem;font-weight:900;color:#92400e;}
.va.dk .neo-title{color:#fcd34d;}
.va .neo-sub{font-size:.66rem;color:#b45309;margin-top:3px;}
.va.dk .neo-sub{color:#92400e;}
.va .neo-sec{margin:0 16px 9px;background:rgba(255,255,255,.65);backdrop-filter:blur(8px);border-radius:13px;padding:11px 13px;border:1.5px solid rgba(255,255,255,.8);}
.va.dk .neo-sec{background:rgba(255,255,255,.05);border-color:rgba(245,158,11,.2);}
.va .ns-title{font-size:.73rem;font-weight:800;color:#92400e;margin-bottom:7px;display:flex;align-items:center;gap:5px;}
.va.dk .ns-title{color:#fcd34d;}
.va .e4{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.va .e3{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
.va .ec{background:rgba(255,255,255,.6);border:2px solid rgba(255,255,255,.8);border-radius:9px;padding:7px 3px;text-align:center;cursor:pointer;}
.va.dk .ec{background:rgba(255,255,255,.05);border-color:rgba(245,158,11,.15);}
.va .ec.on{background:#fff;border-color:#f59e0b;box-shadow:0 2px 8px rgba(245,158,11,.18);}
.va.dk .ec.on{background:rgba(245,158,11,.15);border-color:#f59e0b;}
.va .ec .ee{font-size:1.25rem;margin-bottom:2px;}
.va .ec .el{font-size:.56rem;font-weight:700;color:#92400e;}
.va.dk .ec .el{color:#fcd34d;}
.va .checklist{display:flex;flex-direction:column;gap:5px;}
.va .cli{background:rgba(255,255,255,.6);border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:8px;cursor:pointer;}
.va.dk .cli{background:rgba(255,255,255,.05);}
.va .cb{width:19px;height:19px;border:2.5px solid #f59e0b;border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.7rem;}
.va .cb.ck{background:#f59e0b;border-color:#f59e0b;}
.va .cli-text{font-size:.76rem;font-weight:700;color:#92400e;}
.va.dk .cli-text{color:#fcd34d;}
.va .cli-sub{font-size:.58rem;color:#b45309;}
.va .neo-btn{margin:7px 16px 0;width:calc(100% - 32px);background:linear-gradient(135deg,#f59e0b,#ec4899);border:none;border-radius:13px;padding:15px;color:#fff;font-size:.9rem;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;}
/* A: Neo Time Sections */
.va .time-section{margin:0 16px 9px;background:rgba(255,255,255,.65);border-radius:13px;overflow:hidden;border:1.5px solid rgba(255,255,255,.8);}
.va.dk .time-section{background:rgba(255,255,255,.05);border-color:rgba(245,158,11,.15);}
.va .ts-head{padding:9px 13px;display:flex;align-items:center;gap:7px;}
.va .ts-emoji{font-size:1rem;}
.va .ts-title{font-size:.76rem;font-weight:800;color:#92400e;}
.va.dk .ts-title{color:#fcd34d;}
.va .ts-time{font-size:.6rem;color:#b45309;margin-left:auto;}
.va.dk .ts-time{color:#92400e;}
.va .ts-body{padding:0 13px 10px;}
.va .ts-item{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid rgba(245,158,11,.1);}
.va .ts-item:last-child{border-bottom:none;}
.va .ts-dot{width:6px;height:6px;border-radius:50%;background:#f59e0b;flex-shrink:0;}
.va .ts-text{font-size:.72rem;color:#78350f;}
.va.dk .ts-text{color:#fcd34d;}
.va .ts-check{width:18px;height:18px;border:2px solid #f59e0b;border-radius:4px;margin-left:auto;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.65rem;}
.va .ts-check.ck{background:#f59e0b;}
/* A: Sign Row */
.va .sign-row{margin:0 16px 9px;background:rgba(255,255,255,.65);border-radius:13px;padding:11px 13px;border:1.5px solid rgba(255,255,255,.8);}
.va.dk .sign-row{background:rgba(255,255,255,.05);border-color:rgba(245,158,11,.15);}
.va .sign-title{font-size:.7rem;font-weight:800;color:#92400e;margin-bottom:8px;}
.va.dk .sign-title{color:#fcd34d;}
.va .sign-boxes{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.va .sign-box{background:rgba(255,255,255,.6);border:1.5px dashed rgba(245,158,11,.4);border-radius:9px;padding:12px 8px;text-align:center;}
.va.dk .sign-box{background:rgba(255,255,255,.04);border-color:rgba(245,158,11,.25);}
.va .sign-who{font-size:.6rem;font-weight:700;color:#b45309;margin-bottom:6px;}
.va.dk .sign-who{color:#92400e;}
.va .sign-line{height:1px;background:rgba(245,158,11,.3);margin:0 4px;}
.va .sign-hint{font-size:.56rem;color:#d97706;margin-top:4px;}

/* ═══════════════════════════════════════════
   VERSION B — 卡片活潑版
═══════════════════════════════════════════ */
.vb{--p:#8b5cf6;--pl:#f5f3ff;--pm:#c4b5fd;--s:#10b981;--sl:#d1fae5;--a:#f59e0b;--al:#fef3c7;--pk:#ec4899;--pkl:#fce7f3;--bg:#f9f8ff;--card:#fff;--bd:#ede9fe;--t1:#1e293b;--t2:#64748b;--t3:#94a3b8;--r:16px;}
.vb.dk{--bg:#0d0a1e;--card:#1a1530;--bd:#2d2550;--t1:#e2e8f0;--t2:#94a3b8;--t3:#4c4570;}

.vb .scr{background:var(--bg);min-height:700px;padding-bottom:28px;}
.vb .top-bar{background:var(--card);border-bottom:2px solid var(--bd);padding:13px 18px;display:flex;align-items:center;gap:9px;}
.vb .back{width:32px;height:32px;background:var(--pl);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:.85rem;cursor:pointer;flex-shrink:0;}
.vb.dk .back{background:#2d2550;}
.vb .bar-title{font-size:.9rem;font-weight:800;color:var(--t1);}
.vb .bar-sub{font-size:.6rem;color:var(--t3);margin-top:1px;}
.vb .timer-badge{margin-left:auto;background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;font-size:.6rem;font-weight:700;padding:3px 10px;border-radius:20px;}
.vb .sec-lbl{font-size:.6rem;font-weight:700;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;padding:12px 18px 5px;}
/* B: Login */
.vb .login-scr{background:linear-gradient(145deg,#7c3aed,#db2777,#f59e0b);min-height:700px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;}
.vb.dk .login-scr{background:linear-gradient(145deg,#1a0a2e,#2d0a1e,#1a0a00);}
.vb .login-logo{width:70px;height:70px;background:#fff;border-radius:22px;display:flex;align-items:center;justify-content:center;font-size:1.9rem;margin-bottom:13px;box-shadow:0 8px 28px rgba(0,0,0,.18);}
.vb.dk .login-logo{background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.2);}
.vb .login-title{color:#fff;font-size:1.3rem;font-weight:900;text-align:center;}
.vb .login-sub{color:rgba(255,255,255,.65);font-size:.7rem;text-align:center;margin-top:4px;margin-bottom:26px;}
.vb .login-card{background:rgba(255,255,255,.15);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.25);border-radius:20px;padding:22px;width:100%;}
.vb.dk .login-card{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.1);}
.vb .lbl{font-size:.62rem;font-weight:700;color:rgba(255,255,255,.65);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px;}
.vb .inp{width:100%;background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.3);border-radius:13px;padding:13px 15px;color:#fff;font-size:.95rem;letter-spacing:4px;text-align:center;outline:none;margin-bottom:13px;font-family:inherit;}
.vb .login-btn{width:100%;background:#fff;border:none;border-radius:13px;padding:15px;color:#7c3aed;font-size:.95rem;font-weight:900;cursor:pointer;}
.vb.dk .login-btn{background:linear-gradient(135deg,#7c3aed,#db2777);color:#fff;}
.vb .login-hint{color:rgba(255,255,255,.4);font-size:.6rem;text-align:center;margin-top:9px;}
/* B: Role */
.vb .role-hero{background:linear-gradient(135deg,#7c3aed,#db2777);padding:20px 18px 16px;color:#fff;}
.vb.dk .role-hero{background:linear-gradient(135deg,#1a0a2e,#2d0a1e);}
.vb .rh-title{font-size:1.05rem;font-weight:900;}
.vb .rh-sub{font-size:.67rem;opacity:.6;margin-top:2px;}
.vb .rh-date{background:rgba(255,255,255,.18);border-radius:8px;padding:5px 10px;margin-top:9px;font-size:.66rem;display:inline-block;}
.vb .role-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:13px 16px;}
.vb .rb{background:var(--card);border-radius:var(--r);padding:15px 11px;text-align:center;border-top:4px solid;cursor:pointer;}
.vb.dk .rb{background:var(--card);border-left:1px solid var(--bd);border-right:1px solid var(--bd);border-bottom:1px solid var(--bd);}
.vb .rb .re{font-size:1.7rem;margin-bottom:5px;}
.vb .rb .rn{font-size:.84rem;font-weight:800;color:var(--t1);margin-bottom:2px;}
.vb .rb .rd{font-size:.6rem;color:var(--t3);line-height:1.4;}
.vb .rb-wide{grid-column:span 2;display:flex;align-items:center;gap:11px;text-align:left;padding:13px 15px;}
.vb .rb-wide .re{font-size:1.4rem;margin:0;}
.vb .rb-wide .rn{font-size:.88rem;}
.vb .rb-wide .new-pill{margin-left:auto;background:linear-gradient(135deg,#f59e0b,#ec4899);color:#fff;font-size:.58rem;font-weight:700;padding:2px 8px;border-radius:10px;}
/* B: Parent */
.vb .state-big{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:0 16px 10px;}
.vb .sb{background:var(--card);border:2.5px solid var(--bd);border-radius:14px;padding:13px 5px;text-align:center;cursor:pointer;}
.vb.dk .sb{background:var(--card);}
.vb .sb .se{font-size:1.5rem;margin-bottom:4px;}
.vb .sb .sl{font-size:.72rem;font-weight:700;color:var(--t2);}
.vb .sb.g{background:#d1fae5;border-color:#10b981;} .vb .sb.g .sl{color:#059669;}
.vb .sb.y{background:#fef3c7;border-color:#f59e0b;} .vb .sb.y .sl{color:#d97706;}
.vb .sb.r{background:#fee2e2;border-color:#ef4444;} .vb .sb.r .sl{color:#dc2626;}
.vb.dk .sb.g{background:#052e16;border-color:#10b981;} .vb.dk .sb.g .sl{color:#86efac;}
.vb.dk .sb.y{background:#2d1b00;border-color:#f59e0b;} .vb.dk .sb.y .sl{color:#fcd34d;}
.vb.dk .sb.r{background:#2d0a0a;border-color:#ef4444;} .vb.dk .sb.r .sl{color:#fca5a5;}
.vb .tog-big{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px 10px;}
.vb .tb{background:var(--card);border:2.5px solid var(--bd);border-radius:13px;padding:13px;text-align:center;font-size:.82rem;font-weight:800;color:var(--t3);cursor:pointer;}
.vb .tb.y{background:#d1fae5;border-color:#10b981;color:#059669;}
.vb .tb.n{background:#fee2e2;border-color:#ef4444;color:#dc2626;}
.vb.dk .tb.y{background:#052e16;border-color:#10b981;color:#86efac;}
.vb.dk .tb.n{background:#2d0a0a;border-color:#ef4444;color:#fca5a5;}
.vb .chip-row{display:flex;gap:6px;flex-wrap:wrap;padding:0 16px 10px;}
.vb .chip{background:var(--card);border:2px solid var(--bd);border-radius:20px;padding:7px 13px;font-size:.75rem;font-weight:700;color:var(--t2);cursor:pointer;}
.vb .chip.on{background:var(--pl);border-color:var(--p);color:var(--p);}
.vb.dk .chip.on{background:#1a0a2e;border-color:#7c3aed;color:#c4b5fd;}
.vb .textarea-card{margin:0 16px 10px;background:var(--card);border-radius:14px;padding:12px 13px;border:2px solid var(--bd);}
.vb textarea{width:100%;border:none;outline:none;resize:none;font-size:.82rem;color:var(--t1);font-family:inherit;line-height:1.6;background:transparent;}
.vb .btn-pri{margin:9px 16px 0;width:calc(100% - 32px);background:linear-gradient(135deg,#7c3aed,#db2777);border:none;border-radius:15px;padding:16px;color:#fff;font-size:.92rem;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;box-shadow:0 4px 18px rgba(124,58,237,.22);}
.vb.dk .btn-pri{box-shadow:0 4px 18px rgba(124,58,237,.3);}
.vb .btn-sec{margin:7px 16px 0;width:calc(100% - 32px);background:var(--card);border:2px solid var(--bd);border-radius:13px;padding:12px;color:var(--t2);font-size:.8rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
/* B: Teacher */
.vb .today-banner{margin:10px 16px;background:linear-gradient(135deg,#1e3a8a,#4338ca);border-radius:16px;padding:14px 15px;color:#fff;}
.vb.dk .today-banner{background:linear-gradient(135deg,#0a0a1e,#1a1a3e);border:1px solid #2d2d4a;}
.vb .tb-title{font-size:.6rem;font-weight:700;opacity:.6;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px;}
.vb .tb-row{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.vb .tb-row:last-child{margin-bottom:0;}
.vb .tb-icon{font-size:.95rem;width:20px;text-align:center;flex-shrink:0;}
.vb .tb-text{font-size:.78rem;font-weight:500;flex:1;}
.vb .tb-badge{font-size:.6rem;font-weight:700;padding:2px 8px;border-radius:8px;flex-shrink:0;}
.vb .remind{margin:0 16px 9px;background:var(--al);border-left:4px solid var(--a);border-radius:10px;padding:10px 12px;}
.vb.dk .remind{background:#1c1500;border-color:#d97706;}
.vb .remind-text{font-size:.74rem;color:#92400e;line-height:1.5;}
.vb.dk .remind-text{color:#fcd34d;}
.vb .report-card{margin:0 16px 9px;background:var(--card);border-radius:15px;overflow:hidden;border:2px solid var(--bd);}
.vb .rc-head{padding:10px 13px;border-bottom:2px solid var(--bd);font-size:.76rem;font-weight:800;color:var(--t1);display:flex;align-items:center;gap:6px;}
.vb .rc-body{padding:10px 13px;}
.vb .fl{font-size:.58rem;font-weight:700;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;}
.vb .c3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px;}
.vb .c2{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;}
.vb .ci{background:var(--bg);border:2px solid var(--bd);border-radius:10px;padding:9px 4px;text-align:center;font-size:.68rem;font-weight:700;color:var(--t2);cursor:pointer;}
.vb .ci.g{background:#d1fae5;border-color:#10b981;color:#059669;}
.vb .ci.y{background:#fef3c7;border-color:#f59e0b;color:#d97706;}
.vb .ci.r{background:#fee2e2;border-color:#ef4444;color:#dc2626;}
.vb.dk .ci.g{background:#052e16;border-color:#10b981;color:#86efac;}
.vb.dk .ci.y{background:#2d1b00;border-color:#f59e0b;color:#fcd34d;}
.vb.dk .ci.r{background:#2d0a0a;border-color:#ef4444;color:#fca5a5;}
.vb .btn-t{margin:8px 16px 0;width:calc(100% - 32px);background:linear-gradient(135deg,#059669,#0284c7);border:none;border-radius:13px;padding:14px;color:#fff;font-size:.88rem;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;}
/* B: Afterschool */
.vb .pickup-big{margin:10px 16px;background:linear-gradient(135deg,#f59e0b,#ef4444);border-radius:20px;padding:18px;color:#fff;box-shadow:0 8px 28px rgba(245,158,11,.22);}
.vb.dk .pickup-big{background:linear-gradient(135deg,#92400e,#991b1b);}
.vb .pb-lbl{font-size:.6rem;font-weight:700;opacity:.7;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;}
.vb .pb-title{font-size:.95rem;font-weight:900;margin-bottom:12px;}
.vb .pb-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.vb .pb-btn{background:rgba(255,255,255,.2);border:2px solid rgba(255,255,255,.3);border-radius:13px;padding:13px 7px;text-align:center;color:#fff;font-size:.78rem;font-weight:800;cursor:pointer;}
.vb .pb-btn.on{background:#fff;color:#f59e0b;border-color:#fff;box-shadow:0 3px 10px rgba(0,0,0,.12);}
.vb .pb-main{grid-column:span 2;background:#fff;color:#f59e0b;border:none;border-radius:13px;padding:16px;font-size:.95rem;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;}
.vb .hw-card{margin:0 16px 9px;background:var(--card);border-radius:14px;padding:11px 13px;border:2px solid var(--bd);}
.vb .hw-title{font-size:.72rem;font-weight:800;color:var(--t1);margin-bottom:7px;}
.vb .hw-row{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;}
.vb .hw-btn{background:var(--bg);border:2px solid var(--bd);border-radius:9px;padding:8px 3px;text-align:center;font-size:.66rem;font-weight:700;color:var(--t2);cursor:pointer;}
.vb .hw-btn.on{background:#d1fae5;border-color:#10b981;color:#059669;}
.vb.dk .hw-btn.on{background:#052e16;border-color:#10b981;color:#86efac;}
.vb .peer-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:0 16px 10px;}
.vb .peer{background:var(--card);border:2.5px solid var(--bd);border-radius:13px;padding:11px 5px;text-align:center;cursor:pointer;}
.vb .peer .pe{font-size:1.4rem;margin-bottom:3px;}
.vb .peer .pl{font-size:.66rem;font-weight:700;color:var(--t2);}
.vb .peer.on{background:var(--pl);border-color:var(--p);}
.vb .peer.on .pl{color:var(--p);}
.vb.dk .peer.on{background:#1a0a2e;border-color:#7c3aed;}
.vb.dk .peer.on .pl{color:#c4b5fd;}
/* B: Overview */
.vb .ov-hero{background:linear-gradient(135deg,#7c3aed,#db2777);padding:17px 18px 13px;color:#fff;}
.vb.dk .ov-hero{background:linear-gradient(135deg,#1a0a2e,#2d0a1e);}
.vb .ov-title{font-size:.98rem;font-weight:900;}
.vb .ov-sub{font-size:.66rem;opacity:.5;margin-top:2px;}
.vb .ov-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-top:11px;}
.vb .ov-stat{background:rgba(255,255,255,.15);border-radius:10px;padding:8px;text-align:center;}
.vb .ov-n{font-size:1.2rem;font-weight:900;}
.vb .ov-l{font-size:.56rem;opacity:.6;margin-top:1px;}
.vb .today-card{margin:10px 16px;background:var(--card);border-radius:14px;overflow:hidden;border:2px solid var(--bd);}
.vb .tc-row{padding:8px 13px;border-bottom:1px solid var(--bg);display:flex;align-items:center;gap:7px;}
.vb .tc-row:last-child{border-bottom:none;}
.vb .tc-who{font-size:.58rem;font-weight:700;padding:2px 7px;border-radius:5px;flex-shrink:0;}
.vb .tc-text{flex:1;font-size:.72rem;color:var(--t1);}
.vb .tc-val{font-size:.72rem;font-weight:700;color:var(--t1);flex-shrink:0;}
.vb .chart-card{margin:0 16px 9px;background:var(--card);border-radius:14px;padding:12px 13px;border:2px solid var(--bd);}
.vb .chart-title{font-size:.74rem;font-weight:800;color:var(--t1);margin-bottom:10px;display:flex;align-items:center;gap:5px;}
.vb .bars{display:flex;align-items:flex-end;gap:5px;height:68px;}
.vb .bw{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.vb .bar{width:100%;border-radius:4px 4px 0 0;}
.vb .bl{font-size:.53rem;color:var(--t3);font-weight:600;}
.vb .legend{display:flex;gap:9px;margin-top:7px;flex-wrap:wrap;}
.vb .leg{display:flex;align-items:center;gap:3px;font-size:.58rem;color:var(--t2);}
.vb .ldot{width:6px;height:6px;border-radius:50%;}
.vb .neo-diff{margin:0 16px 9px;background:linear-gradient(135deg,var(--pkl),#f5f3ff);border:2px solid #f9a8d4;border-radius:14px;padding:12px 13px;}
.vb.dk .neo-diff{background:linear-gradient(135deg,#1a0a1e,#1a0a2e);border-color:#4a1942;}
.vb .nd-title{font-size:.74rem;font-weight:800;color:var(--pk);margin-bottom:9px;display:flex;align-items:center;gap:5px;}

.vb .nd-label{font-size:.65rem;font-weight:700;color:var(--t1);margin-top:2px;}
.vb.dk .nd-label{color:#e2e8f0;}
.vb .nd-vs{font-size:.75rem;font-weight:800;color:var(--t3);}
.vb .nd-note{font-size:.66rem;color:#9d174d;margin-top:7px;text-align:center;font-weight:600;}
.vb.dk .nd-note{color:#f472b6;}

.vb .ns-title{font-size:.74rem;font-weight:800;color:#7c3aed;margin-bottom:8px;display:flex;align-items:center;gap:5px;}
